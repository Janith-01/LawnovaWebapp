server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the API Gateway container
    location /api/ {
        proxy_pass http://api-gateway:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Socket.IO WebSocket traffic to MockTrial service
    location /socket.io/ {
        proxy_pass http://mocktrial-service:10004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
