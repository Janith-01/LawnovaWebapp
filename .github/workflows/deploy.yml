name: Build, Push & Deploy LawNova

on:
  push:
    branches:
      - deployment
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      web-client: ${{ steps.filter.outputs.web-client }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      user-service: ${{ steps.filter.outputs.user-service }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
      argument-audit-service: ${{ steps.filter.outputs.argument-audit-service }}
      mocktrial-service: ${{ steps.filter.outputs.mocktrial-service }}
      roleplay-service: ${{ steps.filter.outputs.roleplay-service }}
      judgment-prediction-service: ${{ steps.filter.outputs.judgment-prediction-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: HEAD~1
          filters: |
            web-client:
              - 'web-client/**'
            api-gateway:
              - 'api-gateway/**'
            user-service:
              - 'services/user-service/**'
            ai-service:
              - 'services/ai-service/**'
            argument-audit-service:
              - 'services/roleplay-service/python_backend/**'
            mocktrial-service:
              - 'services/mocktrial-service/**'
            roleplay-service:
              - 'services/roleplay-service/**'
              - '!services/roleplay-service/python_backend/**'
            judgment-prediction-service:
              - 'services/judgment-prediction-service/**'

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web-client
        if: ${{ needs.detect-changes.outputs.web-client == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./web-client
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-web-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api-gateway
        if: ${{ needs.detect-changes.outputs.api-gateway == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push user-service
        if: ${{ needs.detect-changes.outputs.user-service == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai-service
        if: ${{ needs.detect-changes.outputs.ai-service == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push argument-audit-service
        if: ${{ needs.detect-changes.outputs.argument-audit-service == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/roleplay-service/python_backend
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-argument-audit-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push mocktrial-service
        if: ${{ needs.detect-changes.outputs.mocktrial-service == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/mocktrial-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-mocktrial-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push roleplay-service
        if: ${{ needs.detect-changes.outputs.roleplay-service == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/roleplay-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-roleplay-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push judgment-prediction-service
        if: ${{ needs.detect-changes.outputs.judgment-prediction-service == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/judgment-prediction-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-judgment-prediction-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/lawnova
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --remove-orphans
            docker image prune -f
            docker compose ps
