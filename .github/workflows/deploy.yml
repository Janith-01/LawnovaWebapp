name: Build, Push & Deploy LawNova

on:
  push:
    branches:
      - deployment
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web-client
        uses: docker/build-push-action@v5
        with:
          context: ./web-client
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-web-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push argument-audit-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/roleplay-service/python_backend
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-argument-audit-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push mocktrial-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/mocktrial-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-mocktrial-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push roleplay-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/roleplay-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-roleplay-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push judgment-prediction-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/judgment-prediction-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/lawnova-judgment-prediction-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/lawnova
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --remove-orphans
            docker image prune -f
            docker compose ps
