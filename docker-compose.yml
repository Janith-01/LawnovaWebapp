services:
 
  web-client:
    image: ${DOCKERHUB_USERNAME}/lawnova-web-client:latest
    container_name: lawnova-web-client
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
 
  api-gateway:
    image: ${DOCKERHUB_USERNAME}/lawnova-api-gateway:latest
    container_name: lawnova-api-gateway
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:5005
      AI_SERVICE_URL: http://ai-service:5008
      AUDIT_SERVICE_URL: http://argument-audit-service:5001
      MOCKTRIAL_SERVICE_URL: http://mocktrial-service:10004
      ROLEPLAY_SERVICE_URL: http://roleplay-service:10005
      JUDGMENT_SERVICE_URL: http://judgment-prediction-service:5006
    depends_on:
      - user-service
      - ai-service
      - argument-audit-service
      - mocktrial-service
      - roleplay-service
      - judgment-prediction-service
    restart: unless-stopped
 
  user-service:
    image: ${DOCKERHUB_USERNAME}/lawnova-user-service:latest
    container_name: lawnova-user-service
    environment:
      NODE_ENV: production
      PORT: 5005
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
 
  ai-service:
    image: ${DOCKERHUB_USERNAME}/lawnova-ai-service:latest
    container_name: lawnova-ai-service
    environment:
      NODE_ENV: production
      PORT: 5008
      MONGODB_URI: ${MONGODB_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DAILY_API_KEY: ${DAILY_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX: ${PINECONE_INDEX}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
 
  argument-audit-service:
    image: ${DOCKERHUB_USERNAME}/lawnova-argument-audit-service:latest
    container_name: lawnova-argument-audit-service
    environment:
      PORT: 5001
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MODEL_PATH: /app/models/LAWNOVA_MODEL_A
      MODEL_A_PATH: /app/models/LAWNOVA_MODEL_A
      MODEL_B_PATH: /app/models/LAWNOVA_MODEL_B_35K
    volumes:
      - /home/ubuntu/lawnova/ml-models/LAWNOVA_MODEL_A:/app/models/LAWNOVA_MODEL_A:ro
      - /home/ubuntu/lawnova/ml-models/LAWNOVA_MODEL_B_35K:/app/models/LAWNOVA_MODEL_B_35K:ro
    restart: unless-stopped
 
  mocktrial-service:
    image: ${DOCKERHUB_USERNAME}/lawnova-mocktrial-service:latest
    container_name: lawnova-mocktrial-service
    environment:
      NODE_ENV: production
      PORT: 10004
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY1: ${GEMINI_API_KEY}
      DAILY_API_KEY: ${DAILY_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      USER_SERVICE_URL: http://user-service:5005
      AI_SERVICE_URL: http://ai-service:5008
      API_GATEWAY_URL: http://api-gateway:5000
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    restart: unless-stopped
 
  roleplay-service:
    image: ${DOCKERHUB_USERNAME}/lawnova-roleplay-service:latest
    container_name: lawnova-roleplay-service
    environment:
      NODE_ENV: production
      PORT: 10005
      MONGODB_URI: ${MONGODB_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AUDIT_SERVICE_URL: http://argument-audit-service:5001
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - argument-audit-service
    restart: unless-stopped
 
  judgment-prediction-service:
    image: ${DOCKERHUB_USERNAME}/lawnova-judgment-prediction-service:latest
    container_name: lawnova-judgment-prediction-service
    environment:
      PORT: 5006
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_KEY1: ${GEMINI_API_KEY}
    volumes:
      - /home/ubuntu/lawnova/ml-models/judgment_predictor:/app/models/judgment_predictor:ro
    restart: unless-stopped
 
networks:
  default:
    name: lawnova-network